<!DOCTYPE html>
<html>
<head>
  <title>ROI Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="nav">
  <a href="index.html">Home</a>
  <a href="commission.html">Commission</a>
  <a href="missed-call.html">Missed Calls</a>
  <a href="roi.html">ROI</a>
</div>

<h2>ROI Calculator</h2>

<div class="field">
  <label>Purchase</label>
  <input type="range" id="purchase" value="200000">
  <div id="purchaseVal"></div>
</div>

<div class="field">
  <label>Rehab</label>
  <input type="range" id="rehab" value="50000">
  <div id="rehabVal"></div>
</div>

<div class="field">
  <label>ARV</label>
  <input type="range" id="arv" value="300000">
  <div id="arvVal"></div>
</div>

<div class="result-box">
  <div>Profit</div>
  <div id="profit">$0</div>

  <div>ROI</div>
  <div id="roi">0%</div>
</div>

<form onsubmit="submitLead(event)">
  <input type="hidden" id="hiddenProfit">
  <input type="hidden" id="hiddenROI">

  <div class="capture-box">
    <input id="email" placeholder="Enter email" required>
    <button type="submit">Send Results</button>
  </div>
</form>

<!-- Suggestions -->
<div class="capture-box">
  <textarea id="suggestionText"></textarea>
  <input id="suggestionEmail">
  <button onclick="submitSuggestion()">Submit Suggestion</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
