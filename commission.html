<!-- Version 10 - Commission Calculator + Lead Intelligence -->
<!DOCTYPE html>
<html>
<head>
  <title>Commission Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="nav">
    <a href="index.html">Home</a>
    <a href="commission.html">Commission</a>
    <a href="missed-call.html">Missed Calls</a>
    <a href="roi.html">ROI</a>
  </div>

  <h2>Real Estate Commission Calculator</h2>

  <!-- SLIDERS -->
  <div class="field">
    <label>Sale Price</label>
    <input type="range" id="price" min="50000" max="1000000" step="10000" value="400000">
    <div class="value-display" id="priceVal">$400,000</div>
  </div>

  <div class="field">
    <label>Commission Rate (%)</label>
    <input type="range" id="commission" min="1" max="6" step="0.5" value="3">
    <div class="value-display" id="commissionVal">3%</div>
  </div>

  <div class="field">
    <label>Broker Split (%)</label>
    <input type="range" id="split" min="50" max="100" step="5" value="80">
    <div class="value-display" id="splitVal">80%</div>
  </div>

  <!-- RESULTS -->
  <div class="result-box">
    <div>Gross Commission</div>
    <div class="result" id="gross">$0</div>

    <div style="margin-top:10px;">Your Earnings</div>
    <div class="result" id="net">$0</div>
  </div>

  <!-- FORM -->
  <form name="lead-capture" method="POST" data-netlify="true">
    <input type="hidden" name="form-name" value="lead-capture">

    <!-- Hidden values -->
    <input type="hidden" name="grossCommission" id="hiddenGross">
    <input type="hidden" name="netCommission" id="hiddenNet">

    <div class="capture-box">
      <p><strong>Send this calculation to yourself</strong></p>
      <input type="email" name="email" placeholder="Enter your email" required>
      <button type="submit">Send Results</button>
    </div>
  </form>

</div>

<script src="script.js"></script>
</body>
</html>
