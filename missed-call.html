<!DOCTYPE html>
<html>
<head>
  <title>Missed Call Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="nav">
  <a href="index.html">Home</a>
  <a href="commission.html">Commission</a>
  <a href="missed-call.html">Missed Calls</a>
  <a href="roi.html">ROI</a>
</div>

<h2>Missed Call Revenue Calculator</h2>
<h2 id="lossHeadline">You're losing $0/month</h2>

<div class="field">
  <label>Monthly Calls</label>
  <input type="range" id="calls" min="10" max="300" value="100">
  <div id="callsVal"></div>
</div>

<div class="field">
  <label>Missed %</label>
  <input type="range" id="missed" min="0" max="80" value="30">
  <div id="missedVal"></div>
</div>

<div class="field">
  <label>Close Rate %</label>
  <input type="range" id="close" min="1" max="30" value="10">
  <div id="closeVal"></div>
</div>

<div class="field">
  <label>Avg Commission</label>
  <input type="range" id="avg" min="1000" max="20000" value="8000">
  <div id="avgVal"></div>
</div>

<div class="result-box red">
  <div>You Are Losing</div>
  <div class="result red" id="lost">$0</div>
</div>

<form onsubmit="submitLead(event)">
  <input type="hidden" id="hiddenLost">

  <div class="capture-box">
    <input id="email" placeholder="Enter email" required>
    <button type="submit">Send Results</button>
  </div>
</form>

<!-- Suggestions -->
<div class="capture-box">
  <p><strong>Have a suggestion?</strong></p>
  <textarea id="suggestionText"></textarea>
  <input id="suggestionEmail">
  <button onclick="submitSuggestion()">Submit Suggestion</button>
</div>

</div>

<div class="sticky-cta">
  <button>Stop Losing Deals — Book Demo</button>
</div>

<script src="script.js"></script>
</body>
</html>
